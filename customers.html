<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customers - Protein Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo">Protein Store</a>
  <div>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="customers.html">Customers</a>
    <a href="orders.html">Orders</a>
  </div>
</nav>

<div class="container">
  <div class="top-bar">
    <h1>Customers</h1>
    <button class="btn-blue" onclick="openAdd()">+ Add Customer</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Address</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="customers-body">
      <tr><td colspan="7">Loading...</td></tr>
    </tbody>
  </table>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <h2 id="modal-title">Add Customer</h2>

    <div class="form-row">
      <div>
        <label>First Name</label>
        <input type="text" id="f-first" placeholder="Liam">
      </div>
      <div>
        <label>Last Name</label>
        <input type="text" id="f-last" placeholder="Murphy">
      </div>
    </div>

    <label>Email</label>
    <input type="email" id="f-email" placeholder="liam@email.com">

    <label>Phone</label>
    <input type="text" id="f-phone" placeholder="087 123 4567">

    <label>Address</label>
    <textarea id="f-address" rows="2" placeholder="14 Main Street, Dublin 1"></textarea>

    <br><br>
    <button class="btn-blue" onclick="save()">Save</button>
    &nbsp;
    <button class="btn-grey" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>Protein Store &copy; 2026 - TU Dublin Project</footer>

<script>
  const SUPABASE_URL = 'https://yyxrtacnqnhzqzelqgkv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5eHJ0YWNucW5oenF6ZWxxZ2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzcyODEsImV4cCI6MjA5MjcxMzI4MX0.5LwkGXOuNQ1TSt0IRcI4hMm-VBJno1mv7rxsHipKeF4';

  let editingId = null;

  function h(extra) {
    return { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', ...extra };
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function load() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/customers?select=*&order=customer_id.asc`, { headers: h() });
    const data = await res.json();
    const tbody = document.getElementById('customers-body');

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="7">No customers found.</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(c => `
      <tr>
        <td>${c.customer_id}</td>
        <td>${c.first_name}</td>
        <td>${c.last_name}</td>
        <td>${c.email}</td>
        <td>${c.phone || '-'}</td>
        <td>${c.address || '-'}</td>
        <td>
          <button class="btn-grey" onclick='edit(${JSON.stringify(c)})'>Edit</button>
          <button class="btn-red" onclick="del(${c.customer_id})">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  function openAdd() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add Customer';
    document.getElementById('f-first').value = '';
    document.getElementById('f-last').value = '';
    document.getElementById('f-email').value = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('f-address').value = '';
    document.getElementById('modal').classList.add('open');
  }

  function edit(c) {
    editingId = c.customer_id;
    document.getElementById('modal-title').textContent = 'Edit Customer';
    document.getElementById('f-first').value = c.first_name || '';
    document.getElementById('f-last').value = c.last_name || '';
    document.getElementById('f-email').value = c.email || '';
    document.getElementById('f-phone').value = c.phone || '';
    document.getElementById('f-address').value = c.address || '';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  async function save() {
    const body = {
      first_name: document.getElementById('f-first').value,
      last_name: document.getElementById('f-last').value,
      email: document.getElementById('f-email').value,
      phone: document.getElementById('f-phone').value,
      address: document.getElementById('f-address').value
    };

    if (!body.first_name || !body.email) { toast('First name and email are required'); return; }

    if (editingId) {
      await fetch(`${SUPABASE_URL}/rest/v1/customers?customer_id=eq.${editingId}`, {
        method: 'PATCH', headers: h({ 'Prefer': 'return=minimal' }), body: JSON.stringify(body)
      });
      toast('Customer updated');
    } else {
      await fetch(`${SUPABASE_URL}/rest/v1/customers`, {
        method: 'POST', headers: h({ 'Prefer': 'return=minimal' }), body: JSON.stringify(body)
      });
      toast('Customer added');
    }
    closeModal();
    load();
  }

  async function del(id) {
    if (!confirm('Are you sure you want to delete this customer?')) return;
    await fetch(`${SUPABASE_URL}/rest/v1/customers?customer_id=eq.${id}`, { method: 'DELETE', headers: h() });
    toast('Customer deleted');
    load();
  }

  load();
</script>

</body>
</html>
