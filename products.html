<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products - Protein Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo">Protein Store</a>
  <div>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="customers.html">Customers</a>
    <a href="orders.html">Orders</a>
  </div>
</nav>

<div class="container">
  <div class="top-bar">
    <h1>Products</h1>
    <button class="btn-blue" onclick="openAdd()">+ Add Product</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Flavour</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="products-body">
      <tr><td colspan="7">Loading...</td></tr>
    </tbody>
  </table>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <h2 id="modal-title">Add Product</h2>

    <label>Name</label>
    <input type="text" id="f-name" placeholder="Product name">

    <label>Description</label>
    <textarea id="f-desc" rows="2" placeholder="Description"></textarea>

    <div class="form-row">
      <div>
        <label>Price (€)</label>
        <input type="number" id="f-price" step="0.01" placeholder="0.00">
      </div>
      <div>
        <label>Stock</label>
        <input type="number" id="f-stock" placeholder="0">
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>Category</label>
        <select id="f-category">
          <option value="">Select...</option>
          <option value="Whey Protein">Whey Protein</option>
          <option value="Protein Bars">Protein Bars</option>
          <option value="Shakers">Shakers</option>
        </select>
      </div>
      <div>
        <label>Flavour</label>
        <input type="text" id="f-flavour" placeholder="e.g. Chocolate">
      </div>
    </div>

    <br>
    <button class="btn-blue" onclick="save()">Save</button>
    &nbsp;
    <button class="btn-grey" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>Protein Store &copy; 2026 - TU Dublin Project</footer>

<script>
  const SUPABASE_URL = 'https://yyxrtacnqnhzqzelqgkv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5eHJ0YWNucW5oenF6ZWxxZ2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzcyODEsImV4cCI6MjA5MjcxMzI4MX0.5LwkGXOuNQ1TSt0IRcI4hMm-VBJno1mv7rxsHipKeF4';

  let editingId = null;

  function h(extra) {
    return { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', ...extra };
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function load() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*&order=product_id.asc`, { headers: h() });
    const data = await res.json();
    const tbody = document.getElementById('products-body');

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="7">No products found.</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(p => `
      <tr>
        <td>${p.product_id}</td>
        <td>${p.name}</td>
        <td>${p.category || '-'}</td>
        <td>${p.flavour || '-'}</td>
        <td>€${parseFloat(p.price).toFixed(2)}</td>
        <td>${p.stock_quantity}</td>
        <td>
          <button class="btn-grey" onclick='edit(${JSON.stringify(p)})'>Edit</button>
          <button class="btn-red" onclick="del(${p.product_id})">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  function openAdd() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add Product';
    document.getElementById('f-name').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-stock').value = '';
    document.getElementById('f-category').value = '';
    document.getElementById('f-flavour').value = '';
    document.getElementById('modal').classList.add('open');
  }

  function edit(p) {
    editingId = p.product_id;
    document.getElementById('modal-title').textContent = 'Edit Product';
    document.getElementById('f-name').value = p.name || '';
    document.getElementById('f-desc').value = p.description || '';
    document.getElementById('f-price').value = p.price || '';
    document.getElementById('f-stock').value = p.stock_quantity || '';
    document.getElementById('f-category').value = p.category || '';
    document.getElementById('f-flavour').value = p.flavour || '';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  async function save() {
    const body = {
      name: document.getElementById('f-name').value,
      description: document.getElementById('f-desc').value,
      price: parseFloat(document.getElementById('f-price').value),
      stock_quantity: parseInt(document.getElementById('f-stock').value),
      category: document.getElementById('f-category').value,
      flavour: document.getElementById('f-flavour').value
    };

    if (!body.name || !body.price) { toast('Please fill in name and price'); return; }

    if (editingId) {
      await fetch(`${SUPABASE_URL}/rest/v1/products?product_id=eq.${editingId}`, {
        method: 'PATCH', headers: h({ 'Prefer': 'return=minimal' }), body: JSON.stringify(body)
      });
      toast('Product updated');
    } else {
      await fetch(`${SUPABASE_URL}/rest/v1/products`, {
        method: 'POST', headers: h({ 'Prefer': 'return=minimal' }), body: JSON.stringify(body)
      });
      toast('Product added');
    }
    closeModal();
    load();
  }

  async function del(id) {
    if (!confirm('Are you sure you want to delete this product?')) return;
    await fetch(`${SUPABASE_URL}/rest/v1/products?product_id=eq.${id}`, { method: 'DELETE', headers: h() });
    toast('Product deleted');
    load();
  }

  load();
</script>

</body>
</html>
